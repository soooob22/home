<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <meta name="description" content="우주 감성의 세련된 자기소개 포트폴리오" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #030611;
      --panel: rgba(12, 17, 33, 0.86);
      --panel-2: rgba(255, 255, 255, 0.04);
      --text: #f6f7fb;
      --muted: #aeb9cf;
      --accent: #8cdcff;
      --accent-2: #8a7dff;
      --accent-3: #73f5a7;
      --border: rgba(255, 255, 255, 0.16);
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(140, 220, 255, 0.16), transparent 24%),
        radial-gradient(circle at 80% 0%, rgba(138, 125, 255, 0.20), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(115, 245, 167, 0.12), transparent 24%),
        linear-gradient(135deg, #02040b 0%, #050816 35%, #02040b 100%);
      min-height: 100vh;
      line-height: 1.7;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.05), transparent 1px),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.06), transparent 1.2px),
        radial-gradient(circle at 60% 40%, rgba(255,255,255,0.05), transparent 1px),
        radial-gradient(circle at 30% 70%, rgba(255,255,255,0.04), transparent 1.4px),
        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.05), transparent 1.1px);
      background-size: 220px 220px;
      opacity: 0.75;
      pointer-events: none;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(ellipse at 40% 20%, rgba(255,255,255,0.08), transparent 30%),
        radial-gradient(ellipse at 70% 70%, rgba(255,255,255,0.06), transparent 24%);
      filter: blur(60px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.6;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.9;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.4); opacity: 1; }
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    .page {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .block {
      background: var(--panel);
      border: 1.5px solid var(--border);
      box-shadow:
        0 12px 40px var(--shadow),
        inset 0 1px 0 rgba(255,255,255,0.06);
      border-radius: 18px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .hero {
      padding: 32px;
      margin-top: 8px;
    }

    .profile {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 24px;
      align-items: center;
    }

    .avatar {
      width: 180px;
      height: 180px;
      border: 1.5px solid var(--border);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03)),
        radial-gradient(circle at 30% 30%, rgba(140, 220, 255, 0.3), transparent 30%);
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .pixel {
      font-family: "Press Start 2P", cursive;
      letter-spacing: 0.04em;
      line-height: 1.5;
    }

    .name {
      font-size: clamp(18px, 2.3vw, 26px);
      margin: 0 0 12px;
      color: var(--accent);
    }

    .intro {
      margin: 0;
      font-size: 15px;
      color: var(--muted);
      max-width: 620px;
    }

    section {
      margin-top: 20px;
      padding: 24px 26px;
    }

    .section-title {
      font-family: "Press Start 2P", cursive;
      font-size: 12px;
      color: var(--accent-2);
      margin: 0 0 16px;
      letter-spacing: 0.04em;
    }

    .chips, .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .chip, .badge {
      padding: 10px 13px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      color: var(--text);
      font-weight: 700;
      font-size: 13px;
      border-radius: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 18px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border-radius: 14px;
      transition: transform 0.18s ease, border-color 0.2s ease;
    }

    .project-card:hover {
      transform: translateY(-2px);
      border-color: rgba(140, 220, 255, 0.35);
    }

    .project-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--accent-3);
    }

    .project-desc {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }

    .project-link {
      margin-top: auto;
      font-weight: 700;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .contact {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 24px 26px;
    }

    .contact p {
      margin: 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      color: var(--text);
      font-weight: 700;
      border-radius: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      transition: transform 0.18s ease, border-color 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: rgba(140, 220, 255, 0.35);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #05111d;
      border-color: transparent;
    }

    .footer {
      text-align: center;
      padding: 20px 0 6px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 760px) {
      .profile {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }

      .projects {
        grid-template-columns: 1fr;
      }

      .contact {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero {
        padding: 24px;
      }

      section {
        padding: 22px 20px;
      }
    }

    @media (max-width: 480px) {
      .page {
        width: min(100% - 20px, 980px);
      }

      .name {
        font-size: 19px;
      }

      .pixel {
        font-size: 11px;
      }

      .chip, .badge {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="page">
    <header class="hero block">
      <div class="profile">
        <div class="avatar" aria-label="프로필 사진 자리">
          PROFILE<br />PHOTO
        </div>

        <div>
          <h1 class="name pixel">이름을 입력해주세요</h1>
          <p class="intro">
            한 줄 소개를 입력해주세요.
          </p>
        </div>
      </div>
    </header>

    <section class="block">
      <h2 class="section-title">관심사</h2>
      <div class="chips">
        <div class="chip">관심사 1</div>
        <div class="chip">관심사 2</div>
        <div class="chip">관심사 3</div>
      </div>
    </section>

    <section class="block">
      <h2 class="section-title">프로젝트</h2>
      <div class="projects">
        <article class="project-card">
          <div class="project-title">프로젝트 1</div>
          <p class="project-desc">프로젝트 설명을 입력하세요.</p>
          <a class="project-link" href="#">링크 보기 →</a>
        </article>

        <article class="project-card">
          <div class="project-title">프로젝트 2</div>
          <p class="project-desc">프로젝트 설명을 입력하세요.</p>
          <a class="project-link" href="#">링크 보기 →</a>
        </article>
      </div>
    </section>

    <section class="block">
      <h2 class="section-title">스킬</h2>
      <div class="skills">
        <span class="badge">HTML</span>
        <span class="badge">CSS</span>
        <span class="badge">JavaScript</span>
        <span class="badge">React</span>
        <span class="badge">Git</span>
      </div>
    </section>

    <section class="contact block">
      <p>이메일: your@email.com</p>
      <div class="actions">
        <a class="btn btn-primary" href="mailto:your@email.com">이메일 보내기</a>
        <a class="btn" href="https://github.com/your-github" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </section>

    <div class="footer">
      © <span id="year"></span> Your Name
    </div>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const starsContainer = document.getElementById("stars");
    const starCount = 90;

    for (let i = 0; i < starCount; i++) {
      const star = document.createElement("span");
      star.className = "star";
      const size = Math.random() * 2.2 + 0.8;
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const delay = Math.random() * 3;
      const duration = Math.random() * 2.5 + 2.2;

      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.left = `${x}%`;
      star.style.top = `${y}%`;
      star.style.animationDelay = `${delay}s`;
      star.style.animationDuration = `${duration}s`;
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
