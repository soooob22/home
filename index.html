<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <meta name="description" content="마인크래프트 감성의 깔끔한 자기소개 포트폴리오" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f2e9;
      --panel: #fffdf8;
      --ink: #2f2a24;
      --muted: #6f675f;
      --grass: #5f8f3f;
      --dirt: #8d5a2b;
      --border: #3e3a34;
      --shadow: #c8b58d;
      --soft: #e9dfc8;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Noto Sans KR", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #fcfbf7 0%, var(--bg) 100%);
      line-height: 1.7;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    .page {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .block {
      background: var(--panel);
      border: 4px solid var(--border);
      box-shadow: 8px 8px 0 var(--shadow);
      border-radius: 18px;
    }

    .hero {
      padding: 32px;
      margin-top: 10px;
    }

    .profile {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 24px;
      align-items: center;
    }

    .avatar {
      width: 180px;
      height: 180px;
      border: 4px solid var(--border);
      background: linear-gradient(135deg, #d8d8d8 0%, #bfbfbf 100%);
      display: grid;
      place-items: center;
      color: #666;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,0.15);
    }

    .pixel {
      font-family: "Press Start 2P", cursive;
      letter-spacing: 0.04em;
      line-height: 1.5;
    }

    .name {
      font-size: clamp(18px, 2.4vw, 28px);
      margin: 0 0 12px;
      color: var(--grass);
    }

    .intro {
      margin: 0;
      font-size: 16px;
      color: var(--muted);
      max-width: 620px;
    }

    section {
      margin-top: 24px;
      padding: 26px 28px;
    }

    .section-title {
      font-family: "Press Start 2P", cursive;
      font-size: 14px;
      color: var(--dirt);
      margin: 0 0 16px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .chip {
      padding: 10px 14px;
      border: 3px solid var(--border);
      background: #f8f2dc;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 4px 4px 0 var(--shadow);
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 18px;
      border: 3px solid var(--border);
      background: linear-gradient(180deg, #fffef8 0%, #f4ebd8 100%);
      box-shadow: 5px 5px 0 var(--shadow);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .project-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 var(--shadow);
    }

    .project-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--grass);
    }

    .project-desc {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }

    .project-link {
      margin-top: auto;
      font-weight: 700;
      color: var(--dirt);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .badge {
      padding: 10px 12px;
      border: 3px solid var(--border);
      background: linear-gradient(180deg, #f7f3e7 0%, #e8dcc3 100%);
      font-weight: 700;
      font-size: 13px;
      box-shadow: 4px 4px 0 var(--shadow);
      color: var(--ink);
    }

    .contact {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 24px 28px;
    }

    .contact p {
      margin: 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border: 3px solid var(--border);
      background: linear-gradient(180deg, #f7f0dc 0%, #e7d9b7 100%);
      font-weight: 700;
      box-shadow: 4px 4px 0 var(--shadow);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--shadow);
    }

    .btn-primary {
      background: linear-gradient(180deg, #90c96a 0%, #5f8f3f 100%);
      color: #fff;
      border-color: #3f642a;
    }

    .footer {
      text-align: center;
      padding: 24px 0 8px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 760px) {
      .profile {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }

      .projects {
        grid-template-columns: 1fr;
      }

      .contact {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero {
        padding: 24px;
      }

      section {
        padding: 22px 20px;
      }
    }

    @media (max-width: 480px) {
      .page {
        width: min(100% - 20px, 980px);
      }

      .name {
        font-size: 20px;
      }

      .pixel {
        font-size: 12px;
      }

      .chip, .badge {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero block">
      <div class="profile">
        <div class="avatar" aria-label="프로필 사진 자리">
          PROFILE<br />PHOTO
        </div>

        <div>
          <h1 class="name pixel">이름을 입력해주세요</h1>
          <p class="intro">
            한 줄 소개를 입력해주세요.
          </p>
        </div>
      </div>
    </header>

    <section class="block">
      <h2 class="section-title">관심사</h2>
      <div class="chips">
        <div class="chip">관심사 1</div>
        <div class="chip">관심사 2</div>
        <div class="chip">관심사 3</div>
      </div>
    </section>

    <section class="block">
      <h2 class="section-title">프로젝트</h2>
      <div class="projects">
        <article class="project-card">
          <div class="project-title">프로젝트 1</div>
          <p class="project-desc">프로젝트 설명을 입력하세요.</p>
          <a class="project-link" href="#">링크 보기 →</a>
        </article>

        <article class="project-card">
          <div class="project-title">프로젝트 2</div>
          <p class="project-desc">프로젝트 설명을 입력하세요.</p>
          <a class="project-link" href="#">링크 보기 →</a>
        </article>
      </div>
    </section>

    <section class="block">
      <h2 class="section-title">스킬</h2>
      <div class="skills">
        <span class="badge">HTML</span>
        <span class="badge">CSS</span>
        <span class="badge">JavaScript</span>
        <span class="badge">React</span>
        <span class="badge">Git</span>
      </div>
    </section>

    <section class="contact block">
      <p>이메일: your@email.com</p>
      <div class="actions">
        <a class="btn btn-primary" href="mailto:your@email.com">이메일 보내기</a>
        <a class="btn" href="https://github.com/your-github" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </section>

    <div class="footer">
      © <span id="year"></span> Your Name
    </div>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
